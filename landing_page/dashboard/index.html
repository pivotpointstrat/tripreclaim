<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TripReclaim — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1d4ed8; --blue-dark: #1e40af; --blue-light: #eff6ff;
      --green: #16a34a; --green-light: #f0fdf4;
      --red: #dc2626; --red-light: #fef2f2;
      --slate: #475569; --slate-light: #f8fafc;
      --border: #e2e8f0; --text: #0f172a;
      --card-shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    }
    body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: var(--text); min-height: 100vh; }

    /* ── Navbar ── */
    .navbar { background: var(--blue); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
    .nav-logo { color: #fff; font-weight: 700; font-size: 1.1rem; text-decoration: none; }
    .nav-logo span { color: #93c5fd; }
    .nav-user { color: #bfdbfe; font-size: 0.85rem; display: flex; align-items: center; gap: 12px; }
    .nav-logout { color: #bfdbfe; background: none; border: 1px solid rgba(255,255,255,.2); padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
    .nav-logout:hover { background: rgba(255,255,255,.1); }

    /* ── Page wrapper ── */
    .page { max-width: 900px; margin: 0 auto; padding: 28px 20px 60px; }

    /* ── Welcome bar ── */
    .welcome-bar { margin-bottom: 24px; }
    .welcome-bar h1 { font-size: 1.4rem; font-weight: 700; color: var(--text); }
    .welcome-bar p { color: var(--slate); font-size: 0.9rem; margin-top: 2px; }

    /* ── Tabs ── */
    .tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 28px; }
    .tab { padding: 10px 20px; font-size: 0.95rem; font-weight: 500; color: var(--slate); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none; }
    .tab:hover { color: var(--blue); }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

    /* ── Cards ── */
    .card { background: #fff; border-radius: 12px; box-shadow: var(--card-shadow); padding: 24px; margin-bottom: 20px; }
    .card-title { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .card-title .badge { font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 20px; background: var(--blue-light); color: var(--blue); }

    /* ── Forms ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: 6px; position: relative; }
    label { font-size: 0.85rem; font-weight: 600; color: #374151; }
    input, select, textarea { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; width: 100%; outline: none; transition: border-color 0.15s; font-family: inherit; }
    input:focus, select:focus, textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(29,78,216,0.1); }
    .hint { font-size: 0.78rem; color: #94a3b8; margin-top: 2px; }
    .form-actions { margin-top: 20px; display: flex; gap: 12px; align-items: center; }

    /* ── Airport autocomplete ── */
    .airport-wrap { position: relative; }
    .airport-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 50; max-height: 220px; overflow-y: auto; margin-top: 2px; }
    .airport-option { padding: 10px 14px; cursor: pointer; font-size: 0.88rem; border-bottom: 1px solid #f1f5f9; display: flex; align-items: baseline; gap: 8px; }
    .airport-option:last-child { border-bottom: none; }
    .airport-option:hover, .airport-option.highlighted { background: var(--blue-light); }
    .airport-code { font-weight: 700; color: var(--blue); font-size: 0.95rem; min-width: 36px; }
    .airport-info { color: var(--slate); font-size: 0.82rem; }
    .airport-input { text-transform: uppercase; }

    /* ── Form steps ── */
    .step-indicator { display: flex; align-items: center; gap: 0; margin-bottom: 24px; }
    .step-item { display: flex; align-items: center; gap: 8px; }
    .step-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; transition: all 0.2s; }
    .step-num.active { background: var(--blue); color: #fff; }
    .step-num.done { background: var(--green); color: #fff; }
    .step-num.pending { background: var(--border); color: #94a3b8; }
    .step-label { font-size: 0.82rem; font-weight: 600; }
    .step-label.active { color: var(--blue); }
    .step-label.done { color: var(--green); }
    .step-label.pending { color: #94a3b8; }
    .step-connector { flex: 1; height: 2px; background: var(--border); margin: 0 8px; min-width: 20px; }
    .step-connector.done { background: var(--green); }
    .form-step { display: none; }
    .form-step.active { display: block; }

    /* ── Lookup banner ── */
    .lookup-banner { background: var(--blue-light); border: 1px solid #bfdbfe; border-radius: 10px; padding: 14px 16px; margin-bottom: 20px; }
    .lookup-banner-title { font-size: 0.85rem; font-weight: 700; color: var(--blue); margin-bottom: 8px; }
    .lookup-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
    .lookup-row .form-group { flex: 1; min-width: 140px; }
    .btn-lookup { background: var(--blue); color: #fff; padding: 10px 16px; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; white-space: nowrap; height: 42px; }
    .btn-lookup:hover { background: var(--blue-dark); }

    /* ── Monitoring preferences ── */
    .match-mode-group { display: flex; gap: 10px; margin-bottom: 16px; }
    .match-mode-opt { flex: 1; padding: 12px 14px; border: 2px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.15s; }
    .match-mode-opt.selected { border-color: var(--blue); background: var(--blue-light); }
    .match-mode-opt .mode-title { font-size: 0.9rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .match-mode-opt.selected .mode-title { color: var(--blue); }
    .match-mode-opt .mode-desc { font-size: 0.78rem; color: #94a3b8; }
    .flexible-prefs { background: var(--slate-light); border-radius: 10px; padding: 14px 16px; margin-top: 8px; display: none; }
    .flexible-prefs.show { display: block; }
    .section-divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    /* ── Buttons ── */
    .btn-primary { background: var(--blue); color: #fff; padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn-primary:hover { background: var(--blue-dark); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: #fff; color: var(--blue); padding: 10px 20px; border: 1px solid var(--blue); border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
    .btn-secondary:hover { background: var(--blue-light); }
    .btn-sm { padding: 5px 12px; font-size: 0.8rem; font-weight: 500; border-radius: 6px; border: 1px solid var(--border); background: #fff; cursor: pointer; color: var(--slate); }
    .btn-sm:hover { border-color: var(--blue); color: var(--blue); }
    .btn-sm.danger:hover { border-color: var(--red); color: var(--red); }
    .btn-danger { background: var(--red); color: #fff; padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }

    /* ── Alerts ── */
    .alert { padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; margin-top: 12px; }
    .alert-success { background: var(--green-light); color: #15803d; }
    .alert-error { background: var(--red-light); color: #b91c1c; }
    .alert-info { background: var(--blue-light); color: var(--blue); }

    /* ── Savings banner ── */
    .savings-banner { background: linear-gradient(135deg, #16a34a, #15803d); color: #fff; padding: 16px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
    .savings-banner .amount { font-size: 1.6rem; font-weight: 800; }
    .savings-banner .label { font-size: 0.85rem; opacity: 0.9; }

    /* ── Plan card ── */
    .plan-card { background: var(--blue); color: #fff; border-radius: 12px; padding: 20px 24px; margin-bottom: 20px; }
    .plan-card .plan-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .plan-card .plan-detail { font-size: 0.85rem; opacity: 0.85; margin-bottom: 16px; }
    .plan-card .plan-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .plan-badge { background: rgba(255,255,255,0.15); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 500; }
    .plan-badge.warn { background: rgba(251,191,36,0.25); color: #fde68a; }
    .plan-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-plan { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: background 0.15s; text-decoration: none; display: inline-block; }
    .btn-plan:hover { background: rgba(255,255,255,0.25); }
    .btn-plan.upgrade { background: #fff; color: var(--blue); border-color: #fff; }
    .btn-plan.upgrade:hover { background: #e0e7ff; }

    /* ── Booking cards ── */
    .booking-card { background: #fff; border-radius: 12px; box-shadow: var(--card-shadow); padding: 16px 20px; margin-bottom: 14px; border-left: 4px solid var(--blue); }
    .booking-card.paused { border-left-color: #94a3b8; opacity: 0.85; }
    .booking-card.expired { border-left-color: #e2e8f0; opacity: 0.6; }
    .booking-route { font-size: 1.05rem; font-weight: 700; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .booking-meta { font-size: 0.82rem; color: var(--slate); margin: 4px 0 10px; }
    .booking-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 12px 0; }
    .stat-box { background: var(--slate-light); border-radius: 8px; padding: 10px 12px; }
    .stat-label { font-size: 0.73rem; color: #94a3b8; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
    .stat-value { font-size: 1rem; font-weight: 700; color: var(--text); margin-top: 2px; }
    .stat-value.drop { color: var(--green); }
    .booking-footer { font-size: 0.76rem; color: #94a3b8; margin-top: 8px; }
    .booking-actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; flex-shrink: 0; }
    .status-dot.paused { background: #94a3b8; }
    .status-dot.expired { background: #e2e8f0; }

    /* ── Onboarding wizard ── */
    .onboarding-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .onboarding-box { background: #fff; border-radius: 16px; padding: 36px 32px; max-width: 480px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .onboarding-logo { font-size: 1.3rem; font-weight: 800; color: var(--blue); margin-bottom: 20px; }
    .onboarding-step { display: none; }
    .onboarding-step.active { display: block; }
    .onboarding-box h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 8px; }
    .onboarding-box p { color: var(--slate); font-size: 0.95rem; margin-bottom: 24px; line-height: 1.6; }
    .onboarding-progress { display: flex; gap: 6px; margin-bottom: 28px; }
    .prog-dot { height: 4px; border-radius: 2px; flex: 1; background: var(--border); transition: background 0.2s; }
    .prog-dot.done { background: var(--blue); }
    .toggle-group { display: flex; gap: 10px; margin: 8px 0 16px; }
    .toggle-opt { flex: 1; padding: 10px; border: 2px solid var(--border); border-radius: 8px; text-align: center; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.15s; }
    .toggle-opt.selected { border-color: var(--blue); background: var(--blue-light); color: var(--blue); }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 48px 24px; color: var(--slate); }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-state h3 { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-bottom: 8px; }

    /* ── Profile form ── */
    .profile-section { margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
    .profile-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .section-title { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #94a3b8; margin-bottom: 14px; }

    /* ── Loading ── */
    .loading-screen { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Auth screen ── */
    .auth-screen { max-width: 400px; margin: 60px auto; background: #fff; border-radius: 16px; box-shadow: var(--card-shadow); padding: 36px 32px; text-align: center; }
    .auth-screen .logo { font-size: 1.5rem; font-weight: 800; color: var(--blue); margin-bottom: 20px; }
    .auth-screen h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
    .auth-screen p { color: var(--slate); font-size: 0.9rem; margin-bottom: 24px; }

    /* ── Price History Modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.7); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-box { background: #fff; border-radius: 16px; padding: 28px; max-width: 640px; width: 100%; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .modal-title { font-size: 1.1rem; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #94a3b8; line-height: 1; }
    .modal-close:hover { color: var(--text); }
    .chart-wrap { background: var(--slate-light); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    .chart-label { font-size: 0.78rem; color: #94a3b8; font-weight: 500; margin-bottom: 8px; }
    .history-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .history-table th { text-align: left; padding: 8px 10px; background: var(--slate-light); color: #94a3b8; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; }
    .history-table td { padding: 8px 10px; border-top: 1px solid var(--border); }
    .history-table tr:hover td { background: var(--blue-light); }
    .price-drop { color: var(--green); font-weight: 600; }

    /* ── Referral card ── */
    .referral-card { background: linear-gradient(135deg, #1d4ed8, #7c3aed); border-radius: 12px; padding: 24px; color: #fff; margin-bottom: 20px; }
    .referral-card h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 6px; }
    .referral-card p { font-size: 0.88rem; opacity: 0.85; margin-bottom: 16px; line-height: 1.5; }
    .referral-link-box { background: rgba(255,255,255,0.15); border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; font-family: monospace; margin-bottom: 12px; word-break: break-all; }
    .btn-copy { background: #fff; color: var(--blue); border: none; padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
    .btn-copy:hover { background: #e0e7ff; }
    .referral-stats { display: flex; gap: 16px; margin-top: 12px; }
    .ref-stat { text-align: center; }
    .ref-stat .val { font-size: 1.4rem; font-weight: 800; }
    .ref-stat .lbl { font-size: 0.78rem; opacity: 0.8; }

    /* ── Sprint 3: Miles / Booking type toggle ── */
    .booking-type-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
    .btype-opt { flex: 1; padding: 10px 12px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; text-align: center; font-size: 0.88rem; font-weight: 600; transition: all 0.15s; color: var(--slate); }
    .btype-opt.selected { border-color: var(--blue); background: var(--blue-light); color: var(--blue); }
    .miles-fields { display: none; background: var(--blue-light); border-radius: 10px; padding: 14px 16px; margin-bottom: 4px; }
    .miles-fields.show { display: block; }

    /* ── Sprint 3: Basic economy warning ── */
    .be-warning { background: #fffbeb; border: 1px solid #fcd34d; border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; color: #92400e; margin-top: 6px; display: none; }
    .be-warning.show { display: block; }

    /* ── Sprint 3: 24-hour window banner ── */
    .window-24h { background: linear-gradient(135deg, #d97706, #b45309); color: #fff; border-radius: 8px; padding: 10px 14px; margin-bottom: 10px; font-size: 0.85rem; display: flex; align-items: center; gap: 10px; }
    .window-24h strong { font-size: 0.9rem; }
    .window-24h .time-left { background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; white-space: nowrap; }

    /* ── Sprint 3: Claim kit / credits ── */
    .btn-sm.claim { border-color: var(--green); color: var(--green); }
    .btn-sm.claim:hover { background: var(--green-light); }
    .btn-sm.policy { border-color: var(--blue); color: var(--blue); }
    .btn-sm.policy:hover { background: var(--blue-light); }
    .credit-claimed-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--green-light); color: var(--green); border-radius: 20px; padding: 3px 10px; font-size: 0.78rem; font-weight: 600; margin-top: 6px; }
    .expiry-pill { font-size: 0.72rem; padding: 1px 7px; border-radius: 20px; font-weight: 600; }
    .expiry-ok { background: #d1fae5; color: #065f46; }
    .expiry-soon { background: #fef3c7; color: #92400e; }
    .expiry-urgent { background: #fee2e2; color: #991b1b; }

    /* ── Sprint 3: Policy changes banner ── */
    .policy-changes-banner { background: linear-gradient(135deg, #7c3aed, #5b21b6); color: #fff; border-radius: 12px; padding: 14px 18px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .policy-changes-banner .pcb-text { font-size: 0.88rem; }
    .policy-changes-banner .pcb-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 2px; }
    .btn-pcb { background: rgba(255,255,255,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 6px 14px; border-radius: 8px; font-size: 0.82rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .btn-pcb:hover { background: rgba(255,255,255,0.3); }

    /* ── Sprint 3: Credits tracker ── */
    .credit-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .credit-row:last-child { border-bottom: none; }
    .credit-row .cr-airline { font-weight: 600; font-size: 0.92rem; }
    .credit-row .cr-route { font-size: 0.78rem; color: var(--slate); }
    .credit-row .cr-amount { font-size: 1.1rem; font-weight: 800; color: var(--green); }

    /* ── Sprint 4: Email Generator ── */
    .email-gen-box { background: var(--slate-light); border-radius: 10px; padding: 16px; margin-top: 16px; }
    .email-gen-subject { font-size: 0.82rem; font-weight: 700; color: var(--slate); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .email-subject-val { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.88rem; font-weight: 600; background: #fff; margin-bottom: 10px; }
    .email-body-ta { width: 100%; min-height: 220px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.83rem; line-height: 1.6; resize: vertical; font-family: 'Inter', monospace; color: var(--text); background: #fff; }
    .email-gen-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  </style>
</head>
<body>
<div id="root"></div>

<script>
const API = 'https://tripreclaim-production.up.railway.app';

// ═══════════════════════════════════════════
// AIRPORT DATABASE (300+ airports)
// ═══════════════════════════════════════════
const AIRPORTS = [
  // ── Major US Airports ──
  {c:'JFK',n:'John F. Kennedy International',city:'New York'},
  {c:'LGA',n:'LaGuardia',city:'New York'},
  {c:'EWR',n:'Newark Liberty International',city:'New York'},
  {c:'LAX',n:'Los Angeles International',city:'Los Angeles'},
  {c:'BUR',n:'Hollywood Burbank',city:'Los Angeles'},
  {c:'LGB',n:'Long Beach Airport',city:'Long Beach'},
  {c:'SNA',n:'John Wayne Airport',city:'Orange County'},
  {c:'ONT',n:'Ontario International',city:'Ontario'},
  {c:'ORD',n:'O\u2019Hare International',city:'Chicago'},

// ── Auth helpers ──
const getToken = () => localStorage.getItem('tr_token');
const setToken = t => localStorage.setItem('tr_token', t);
const clearToken = () => { localStorage.removeItem('tr_token'); localStorage.removeItem('tr_user'); };
const getUser = () => { try { return JSON.parse(localStorage.getItem('tr_user')); } catch { return null; } };
const setUser = u => localStorage.setItem('tr_user', JSON.stringify(u));
const authHeaders = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` });

async function apiFetch(path, opts = {}) {
  const r = await fetch(`${API}${path}`, { headers: authHeaders(), ...opts });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ═══════════════════════════════════════════
// AIRPORT AUTOCOMPLETE
// ═══════════════════════════════════════════
let acActive = null; // currently focused autocomplete: 'origin' | 'dest'
let acHighlight = -1;

function searchAirports(q) {
  if (!q || q.length < 1) return [];
  const upper = q.toUpperCase();
  const lower = q.toLowerCase();
  const results = [];
  // Exact code match first
  AIRPORTS.forEach(a => { if (a.c === upper) results.push({...a, score: 100}); });
  // City starts with
  AIRPORTS.forEach(a => { if (a.city.toLowerCase().startsWith(lower) && a.c !== upper) results.push({...a, score: 80}); });
  // City contains
  AIRPORTS.forEach(a => { if (a.city.toLowerCase().includes(lower) && !a.city.toLowerCase().startsWith(lower) && a.c !== upper) results.push({...a, score: 60}); });
  // Airport name contains
  AIRPORTS.forEach(a => { if (a.n.toLowerCase().includes(lower) && !results.find(r => r.c === a.c)) results.push({...a, score: 40}); });
  return results.slice(0, 8);
}

function openAcDropdown(id, results) {
  closeAcDropdown();
  if (!results.length) return;
  acActive = id;
  acHighlight = -1;
  const wrap = document.getElementById(id + '-wrap');
  if (!wrap) return;
  const dd = document.createElement('div');
  dd.className = 'airport-dropdown';
  dd.id = 'ac-dd';
  results.forEach((a, i) => {
    const opt = document.createElement('div');
    opt.className = 'airport-option';
    opt.dataset.idx = i;
    opt.innerHTML = `<span class="airport-code">${a.c}</span><span class="airport-info">${a.n} · ${a.city}</span>`;
    opt.onmousedown = (e) => { e.preventDefault(); selectAirport(id, a); };
    dd.appendChild(opt);
  });
  wrap.appendChild(dd);
}

function closeAcDropdown() {
  const dd = document.getElementById('ac-dd');
  if (dd) dd.remove();
  acActive = null;
  acHighlight = -1;
}

function selectAirport(id, airport) {
  const input = document.getElementById(id);
  if (input) { input.value = airport.c; input.dataset.selected = airport.c; }
  closeAcDropdown();
}

function onAirportInput(id, val) {
  const results = searchAirports(val);
  openAcDropdown(id, results);
  const input = document.getElementById(id);
  if (input) { input.dataset.selected = ''; }
}

function onAirportKeydown(id, e, val) {
  const dd = document.getElementById('ac-dd');
  if (!dd) { if (e.key === 'Enter') e.preventDefault(); return; }
  const opts = dd.querySelectorAll('.airport-option');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acHighlight = Math.min(acHighlight + 1, opts.length - 1);
    opts.forEach((o, i) => o.classList.toggle('highlighted', i === acHighlight));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acHighlight = Math.max(acHighlight - 1, 0);
    opts.forEach((o, i) => o.classList.toggle('highlighted', i === acHighlight));
  } else if (e.key === 'Enter' || e.key === 'Tab') {
    if (acHighlight >= 0 && opts[acHighlight]) {
      e.preventDefault();
      opts[acHighlight].onmousedown(e);
    } else {
      closeAcDropdown();
    }
  } else if (e.key === 'Escape') {
    closeAcDropdown();
  }
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('#ac-dd') && !e.target.closest('.airport-wrap')) closeAcDropdown();
});

// ROUTER
// ═══════════════════════════════════════════
async function init() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if (token) {
    render(loadingScreen());
    try {
      const data = await fetch(`${API}/auth/verify?token=${encodeURIComponent(token)}`).then(r => r.json());
      if (data.error) { renderAuth(data.error); return; }
      setToken(data.token);
      setUser(data.user);
      window.history.replaceState({}, '', '/dashboard/');
      await renderApp();
    } catch { renderAuth('Link expired or invalid. Request a new one below.'); }
    return;
  }
  if (getToken()) {
    try { const data = await apiFetch('/auth/me'); setUser(data); await renderApp(); }
    catch { clearToken(); renderAuth(); }
  } else { renderAuth(); }
}

// AUTH SCREEN
// ═══════════════════════════════════════════
function renderAuth(msg = '') {
  render(`
    <div class="auth-screen">
      <div class="logo">✈️ <span>Trip</span>Reclaim</div>
      <h2>Sign in to your dashboard</h2>
      <p>Enter your email and we'll send you a secure login link.</p>
      <div class="form-group" style="text-align:left">
        <label>Email Address</label>
        <input type="email" id="auth-email" placeholder="you@example.com">
      </div>
      <div id="auth-msg">${msg ? `<div class="alert alert-error">${msg}</div>` : '' }</div>
      <button class="btn-primary" id="auth-btn" onclick="sendMagicLink()" style="width:100%;margin-top:16px;">Send Login Link →</button>
      <p style="margin-top:20px;font-size:0.82rem;color:#94a3b8;">Don't have an account? <a href="/" style="color:var(--blue);">Get started on the homepage</a></p>
    </div>
  `);
  document.getElementById('auth-email').focus();
  document.getElementById('auth-email').addEventListener('keydown', e => { if (e.key === 'Enter') sendMagicLink(); });
}

async function sendMagicLink() {
  const email = document.getElementById('auth-email')?.value?.trim();
  if (!email) return;
  const btn = document.getElementById('auth-btn');
  btn.disabled = true; btn.textContent = 'Sending...';
  try {
    await fetch(`${API}/auth/magic-link`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
    document.getElementById('auth-msg').innerHTML = `<div class="alert alert-success">✅ Check your email for a login link!</div>`;
  } catch { document.getElementById('auth-msg').innerHTML = `<div class="alert alert-error">Failed to send. Try again.</div>`; }
  btn.disabled = false; btn.textContent = 'Send Login Link →';
}

// ═══════════════════════════════════════════
async function renderApp() {
  const user = getUser() || {};
  renderShell(user);
  if (!user.onboardingComplete && !user.name) showOnboarding();
  else switchTab(activeTab);
}

function renderShell(user) {
  const firstName = user.name ? user.name.split(' ')[0] : (user.email ? user.email.split('@')[0] : 'there');
  render(`
    <nav class="navbar">
      <a href="/" class="nav-logo"><img src="/logos/logo.png" alt="TripReclaim" style="height:36px;width:auto;display:block;"></a>
      <div class="nav-user">
        <span>${user.email || '' }</span>
        <button class="nav-logout" onclick="logout()">Sign out</button>
      </div>
    </nav>
    <div class="page">
      <div class="welcome-bar">
        <h1>Welcome back${user.name ? ', ' + user.name.split(' ')[0] : '' }! ✈️</h1>
        <p>Monitor your flight prices and claim refunds when they drop.</p>
      </div>
      <div class="tabs">
        <button class="tab ${activeTab==='flights'?'active':'' }" onclick="switchTab('flights')">✈ My Flights</button>
        <button class="tab ${activeTab==='account'?'active':'' }" onclick="switchTab('account')">👤 Account</button>
      </div>
      <div id="tab-content"></div>
    </div>
    <div id="onboarding-overlay" style="display:none;"></div>
  `);
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (tab==='flights' && i===0) || (tab==='account' && i===1)));
  if (tab === 'flights') renderFlightsTab();
  else renderAccountTab();
}

function logout() { clearToken(); renderAuth(); }
function loadingScreen() { return `<div class="loading-screen"><div class="spinner"></div></div>`; }

// ONBOARDING WIZARD
// ═══════════════════════════════════════════
let obStep = 1;
let obData = { name: '', phone: '', notifEmail: true, notifSms: false };

function showOnboarding() {
  obStep = 1;
  const overlay = document.getElementById('onboarding-overlay');
  overlay.style.display = 'flex';
  renderOnboardingStep();
}

function renderOnboardingStep() {
  const overlay = document.getElementById('onboarding-overlay');
  overlay.className = 'onboarding-overlay';
  overlay.innerHTML = `
    <div class="onboarding-box">
      <div class="onboarding-logo">✈️ TripReclaim</div>
      <div class="onboarding-progress">
        <div class="prog-dot ${obStep >= 1 ? 'done' : '' }"></div>
        <div class="prog-dot ${obStep >= 2 ? 'done' : '' }"></div>
        <div class="prog-dot ${obStep >= 3 ? 'done' : '' }"></div>
      </div>
      ${obStep === 1 ? renderObStep1() : obStep === 2 ? renderObStep2() : renderObStep3()}
    </div>
  `;
}

function renderObStep1() {
  return `<div class="onboarding-step active">
    <h2>Welcome to TripReclaim! 🎉</h2>
    <p>Let's set up your account so we can personalize your price alerts.</p>

}

function renderObStep2() {
  return `<div class="onboarding-step active">
    <h2>Notification Preferences</h2>
    <p>How would you like to be notified when we detect a price drop?</p>
    <div class="form-group" style="margin-bottom:16px;">
      <label>Phone Number <span style="font-weight:400;color:#94a3b8">(optional — for SMS alerts)</span></label>
      <input type="tel" id="ob-phone" placeholder="+1 (555) 000-0000" value="${obData.phone}">
    </div>

    <div class="toggle-group">
      <div class="toggle-opt ${obData.notifEmail ? 'selected' : '' }" onclick="toggleOb('email')" id="tog-email">📧 Email</div>
      <div class="toggle-opt ${obData.notifSms ? 'selected' : '' }" onclick="toggleOb('sms')" id="tog-sms">📱 SMS</div>

      </p>
    </div>
    <div style="display:flex;gap:12px;margin-top:20px;">
      <button class="btn-secondary" style="flex:1;" onclick="obBack()">← Back</button>
      <button class="btn-primary" style="flex:2;" onclick="obNext2()">Continue →</button>
    </div>

function renderObStep3() {
  return `<div class="onboarding-step active">
    <h2>You're all set, ${obData.name.split(' ')[0]}! 🚀</h2>
    <p>Your account is ready. Add your first flight below and we'll start monitoring the price immediately.</p>
    <div style="background:var(--blue-light);border-radius:10px;padding:16px;margin-bottom:20px;">
      <div style="font-size:0.85rem;color:var(--blue);font-weight:600;margin-bottom:8px;">✅ Account Summary</div>
      <div style="font-size:0.9rem;color:#1e40af;">Name: <strong>${obData.name}</strong></div>
      ${obData.phone ? `<div style="font-size:0.9rem;color:#1e40af;">Phone: <strong>${obData.phone}</strong></div>` : '' }
      <div style="font-size:0.9rem;color:#1e40af;">Alerts: <strong>${[obData.notifEmail?'Email':'',obData.notifSms?'SMS':''].filter(Boolean).join(' + ') || 'Email'}</strong></div>
    </div>
    <button class="btn-primary" style="width:100%;" onclick="obFinish()">Go to My Dashboard →</button>
  </div>`;
}

function toggleOb(type) {
  if (type === 'email') { obData.notifEmail = !obData.notifEmail; document.getElementById('tog-email').classList.toggle('selected', obData.notifEmail); }
  else { obData.notifSms = !obData.notifSms; document.getElementById('tog-sms').classList.toggle('selected', obData.notifSms); }
}

function obNext1() {
  const name = document.getElementById('ob-name').value.trim();
  if (!name) { document.getElementById('ob-name').focus(); return; }
  obData.name = name; obStep = 2; renderOnboardingStep();
}

function obBack() { obStep = Math.max(1, obStep - 1); renderOnboardingStep(); }

function obNext2() { obData.phone = document.getElementById('ob-phone').value.trim(); obStep = 3; renderOnboardingStep(); }

async function obFinish() {
  try {
    const data = await apiFetch('/auth/profile', { method: 'PUT', body: JSON.stringify({ name: obData.name, phone: obData.phone, notificationPrefs: { email: obData.notifEmail, sms: obData.notifSms }, onboardingComplete: true }) });
    setUser(data);
  } catch(e) {}
  document.getElementById('onboarding-overlay').style.display = 'none';
  const wb = document.querySelector('.welcome-bar h1');
  if (wb && obData.name) wb.textContent = `Welcome, ${obData.name.split(' ')[0]}! ✈️`;
  switchTab('flights');
}

async function openAirlineLookup() {
  const airline = document.getElementById('lookup-airline').value;
  const conf = document.getElementById('lookup-conf').value.trim().toUpperCase();
  const lastName = document.getElementById('lookup-lastname').value.trim();
  const btn = document.querySelector('.btn-lookup');
  const hint = document.getElementById('lookup-hint');

  if (!airline) { alert('Please select an airline first.'); return; }
  if (!conf)    { alert('Please enter your confirmation number.'); return; }
  if (!lastName){ alert('Please enter your last name.'); return; }

  // Check if this airline supports auto-lookup
  const supported = ['American Airlines','Delta','United','JetBlue','Alaska Airlines'];
  if (!supported.includes(airline)) {
    // Fallback: open manage booking page for unsupported airlines
    const fa = document.getElementById('f-airline'); if (fa) fa.value = airline;
    const fi = document.getElementById('f-conf');    if (fi) fi.value = conf;
    hint.innerHTML = `⚠️ Auto-lookup isn't available for ${airline} yet. <a href="${AIRLINE_LOOKUP_URLS[airline] || 'https://www.google.com/search?q='+encodeURIComponent(airline+' manage booking')}" target="_blank" style="color:#1d4ed8;">Open manage booking →</a> and enter details below.`;
    return;
  }

  // Show loading state
  btn.disabled = true;
  btn.textContent = '🔍 Looking up...';
  hint.innerHTML = '<span style="color:#1d4ed8;">⏳ Connecting to ' + airline + '...</span>';

  try {
    const result = await apiFetch('/lookup/booking', {
      method: 'POST',
      body: JSON.stringify({ airline, confirmationNumber: conf, lastName })
    });

    if (result && result.data) {
      const d = result.data;
      // Auto-fill main booking form
      const set = (id, val) => { const el = document.getElementById(id); if (el && val) el.value = val; };
      set('f-airline',   d.airline);
      set('f-origin',    d.origin);
      set('f-dest',      d.destination);
      set('f-depdate',   d.departureDate);
      set('f-cabin',     d.cabinClass || 'economy');
      set('f-conf',      d.confirmationNumber);
      set('f-flightnum', d.flightNumber || '');
      // Passengers
      const paxEl = document.getElementById('f-passengers');
      if (paxEl && d.passengers) paxEl.value = d.passengers;
      // Show success + prompt for price
      hint.innerHTML = '<span style="color:#16a34a;">✅ Booking found! One last thing — enter the price you paid below (check your confirmation email).</span>';
      // Scroll to main form
      document.getElementById('f-price').scrollIntoView({ behavior: 'smooth', block: 'center' });
      document.getElementById('f-price').focus();
    } else {
      hint.innerHTML = '<span style="color:#dc2626;">❌ Could not retrieve booking. Please enter details manually below.</span>';
    }
  } catch (err) {
    const msg = err.message || 'Lookup failed';
    hint.innerHTML = '<span style="color:#dc2626;">❌ ' + msg + '</span>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Look Up Booking →';
  }
}

function setMatchMode(mode) {
  matchMode = mode;
  document.getElementById('mode-exact').classList.toggle('selected', mode === 'exact');
  document.getElementById('mode-flexible').classList.toggle('selected', mode === 'flexible');
  document.getElementById('exact-prefs').style.display = mode === 'exact' ? 'block' : 'none';
  document.getElementById('flexible-prefs').classList.toggle('show', mode === 'flexible');
}

function goToStep2() {
  // Validate step 1
  const airline = document.getElementById('f-airline').value;
  const origin = document.getElementById('f-origin').value.trim().toUpperCase().replace(/[^A-Z]/g,'').slice(0,3);
  const dest = document.getElementById('f-dest').value.trim().toUpperCase().replace(/[^A-Z]/g,'').slice(0,3);
  const depDate = document.getElementById('f-depdate').value;
  const price = document.getElementById('f-price').value;

  if (!airline) { showMsg('form-msg', 'Please select an airline.', 'error'); return; }
  if (!origin || origin.length < 3) { showMsg('form-msg', 'Please enter a valid departure airport (3-letter code or city name).', 'error'); return; }
  if (!dest || dest.length < 3) { showMsg('form-msg', 'Please enter a valid destination airport (3-letter code or city name).', 'error'); return; }
  if (!depDate) { showMsg('form-msg', 'Please select a departure date.', 'error'); return; }
  if (!price || price === '$') { showMsg('form-msg', 'Please enter the price you paid.', 'error'); return; }

  // Save step 1 data
  formData = {
    airline, origin, destination: dest,
    departureDate: depDate,
    returnDate: document.getElementById('f-retdate').value || null,
    cabinClass: document.getElementById('f-cabin').value,
    passengers: parseInt(document.getElementById('f-pax').value),
    pricePaid: parseFloat(price.replace(/[$,]/g, '' )),
    confirmationNumber: document.getElementById('f-conf').value.trim().toUpperCase() || null,
  };
  formData.bookingType = currentBookingType;
  if (currentBookingType === 'miles') {
    formData.milesPaid = parseInt(document.getElementById('f-miles')?.value) || null;
    formData.milesProgram = document.getElementById('f-miles-program')?.value || null;
  }

async function submitBooking() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Submitting...';

  const flightNum = document.getElementById('f-flightnum')?.value?.trim().toUpperCase() || null;
  const stops = parseInt(document.getElementById('f-stops')?.value ?? 0);
  const timeWindow = document.getElementById('f-timewin')?.value || '2h';
  const airlineFlex = document.getElementById('f-airline-flex')?.value || 'same';
  const threshold = parseFloat(document.getElementById('f-threshold').value) || 10;

  const body = {
    ...formData,
    flightNumber: flightNum,
    matchMode,
    monitoringPrefs: matchMode === 'exact'
      ? { flightNumber: flightNum }
      : { maxStops: stops, timeWindow, airlinePreference: airlineFlex },
    dropThreshold: threshold,
  };

  try {
    await apiFetch('/bookings', { method: 'POST', body: JSON.stringify(body) });
    showMsg('step2-msg', `✅ Flight added! Now monitoring ${formData.origin} → ${formData.destination}.`, 'success');
    // Reset form
    goToStep1();
    document.getElementById('f-airline').value = ''; document.getElementById('f-origin').value = ''; document.getElementById('f-dest').value = ''; document.getElementById('f-depdate').value = ''; document.getElementById('f-price').value = ''; document.getElementById('f-conf').value = ''; document.getElementById('f-flightnum').value = ''; formData = {};
    loadBookings();
  } catch (err) {
    showMsg('step2-msg', `❌ ${err.message}`, 'error');
    // Handle flight cap error with upgrade prompt
    try {
      const errData = JSON.parse(err.message);
      if (errData && errData.code === 'FLIGHT_CAP_REACHED') {
        const capMap = { per_trip: 1, monthly: 5, annual: 15 };
        const upgradeLinks = {
          monthly: 'https://buy.stripe.com/eVqaEPgMj8ytaP45D54wM05',
          annual:  'https://buy.stripe.com/bJe28j3ZxeWR6yO0iL4wM06'
        };
        const upgradeLink = upgradeLinks[errData.upgradeTo] || upgradeLinks.monthly;
        const upgradeLabel = errData.upgradeTo === 'annual' ? 'Annual ($49/yr)' : 'Monthly ($5.99/mo)';
        showMsg('step2-msg',
          `🚫 Flight monitoring limit reached (${errData.current} of ${errData.cap} active). ` +
          `<a href="${upgradeLink}" target="_blank" style="color:#1d4ed8;font-weight:700;">Upgrade to ${upgradeLabel} →</a>`,
          'error'
        );
      }
    } catch(_) {}
  }
  btn.disabled = false; btn.textContent = 'Start Monitoring This Flight →';
}

// ── Price formatter ──
function formatPrice(input) {
  let raw = input.value.replace(/[^0-9.]/g, '' );
  const parts = raw.split('.' );
  if (raw) {
    const intPart = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',' );
    const decPart = parts[1] !== undefined ? '.'  + parts[1].slice(0, 2) : '' ;
    input.value = '$'  + intPart + decPart;
  }
}

// PRICE HISTORY MODAL
// ═══════════════════════════════════════════
function renderPriceChart(priceHistory, pricePaid) {
  if (!priceHistory || priceHistory.length < 2) return '<div style="text-align:center;padding:24px;color:#94a3b8;">Not enough data yet.</div>';
  const prices = priceHistory.map(p => p.price);
  const min = Math.min(...prices, pricePaid * 0.7);
  const max = Math.max(...prices, pricePaid * 1.1);
  const range = max - min || 1;
  const W = 540, H = 140, PAD = 24;
  const pts = prices.map((p, i) => {
    const x = PAD + ((i / (prices.length - 1)) * (W - PAD * 2));
    const y = PAD + ((1 - (p - min) / range) * (H - PAD * 2));
    return [x, y, p];
  });
  const line = pts.map((p, i) => `${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join('' );
  const area = line + ` L${pts[pts.length-1][0].toFixed(1)},${H} L${PAD},${H} Z`;
  const paidY = PAD + ((1 - (pricePaid - min) / range) * (H - PAD * 2));
  const dots = pts.map(([x,y,price]) => `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="${price < pricePaid ? '#16a34a'  : '#1d4ed8' }" />`).join('' );
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.2"/><stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#grad)"/>
    <line x1="${PAD}" y1="${paidY.toFixed(1)}" x2="${W-PAD}" y2="${paidY.toFixed(1)}" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
    <text x="${W-PAD-2}" y="${(paidY-4).toFixed(1)}" font-size="9" fill="#dc2626" text-anchor="end">paid $${pricePaid.toFixed(0)}</text>
    <path d="${line}" fill="none" stroke="#1d4ed8" stroke-width="2" stroke-linejoin="round"/>
    ${dots}
    <text x="4" y="${PAD+4}" font-size="9" fill="#94a3b8">$${max.toFixed(0)}</text>
    <text x="4" y="${H-PAD+4}" font-size="9" fill="#94a3b8">$${min.toFixed(0)}</text>
  </svg>`;
}

async function viewBookingHistory(id) {
  let overlay = document.getElementById('history-modal' );
  if (!overlay) { overlay = document.createElement('div' ); overlay.id = 'history-modal' ; document.body.appendChild(overlay); }
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal-box"><div class="loading-screen" style="min-height:120px;"><div class="spinner"></div></div></div>`;
  overlay.style.display = 'flex';
  overlay.addEventListener('click' , e => { if (e.target === overlay) closeHistoryModal(); });
  try {
    const { booking } = await apiFetch(`/bookings/${id}`);
    const ph = booking.priceHistory || [];
    const dep = new Date(booking.departureDate).toLocaleDateString('en-US' , {month:'short',day:'numeric',year:'numeric'});
    const lowest = ph.length ? Math.min(...ph.map(p => p.price)) : null;
    const savings = lowest && lowest < booking.pricePaid ? booking.pricePaid - lowest : null;
    overlay.querySelector('.modal-box' ).innerHTML = `
      <div class="modal-header">
        <div class="modal-title">📈 ${booking.origin} → ${booking.destination} · ${dep}${booking.flightNumber ? ' · ' +booking.flightNumber : '' }</div>
        <button class="modal-close" onclick="closeHistoryModal()">×</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;">
        <div class="stat-box"><div class="stat-label">Price Paid</div><div class="stat-value">$${booking.pricePaid.toFixed(2)}</div></div>
        <div class="stat-box"><div class="stat-label">Lowest Seen</div><div class="stat-value">${lowest ? '$' +lowest.toFixed(2) : '—'}</div></div>
        <div class="stat-box"><div class="stat-label">Potential Savings</div><div class="stat-value ${savings ? 'drop'  : '' }">${savings ? '$' +savings.toFixed(2) : '—'}</div></div>
      </div>
      <div class="chart-wrap">
        <div class="chart-label">PRICE HISTORY · ${ph.length} checks · <span style="color:#dc2626;">— your paid price</span></div>
        ${renderPriceChart(ph, booking.pricePaid)}
      </div>
      ${ph.length > 0 ? `<table class="history-table"><thead><tr><th>Date & Time</th><th>Price Found</th><th>vs Paid</th></tr></thead><tbody>${ph.slice().reverse().slice(0,20).map(p => { const diff = booking.pricePaid - p.price; const dt = new Date(p.checkedAt).toLocaleString('en-US' ,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); return `<tr><td>${dt}</td><td>$${p.price.toFixed(2)}</td><td class="${diff>0?'price-drop':'' }">$${diff>0?'-'  +diff.toFixed(2)+' savings' :'+'  +Math.abs(diff).toFixed(2)+' higher'}</td></tr>`; }).join('' )}</tbody></table>` : '<p style="text-align:center;color:#94a3b8;padding:16px;">No price checks yet — the monitor checks every 30 minutes.</p>'}
    `;
  } catch(e) {
    overlay.querySelector('.modal-box' ).innerHTML = `<div class="modal-header"><div class="modal-title">Price History</div><button class="modal-close" onclick="closeHistoryModal()">×</button></div><div class="alert alert-error">Failed to load price history.</div>`;
  }
}

    const btn = event.target; btn.textContent = 'Copied! ✅' ; setTimeout(() => btn.textContent = 'Copy Link' , 2000);
  }).catch(() => alert('Copy this link: ' + link));
}

// Booking type toggle
let currentBookingType = 'cash';
function setBookingType(type) {
  currentBookingType = type;
  document.getElementById('btype-cash').classList.toggle('selected', type === 'cash');
  document.getElementById('btype-miles').classList.toggle('selected', type === 'miles');
  document.getElementById('miles-fields').classList.toggle('show', type === 'miles');
  const priceInput = document.getElementById('f-price');
  if (priceInput) priceInput.placeholder = type === 'miles' ? 'Cash co-pay (if any, else $0)' : 'e.g. $1,299.00';
}

// Basic economy warning
document.addEventListener('change', function(e) {
  if (e.target && e.target.id === 'f-cabin') {
    const warn = document.getElementById('be-warning');
    if (warn) warn.classList.toggle('show', e.target.value === 'basic_economy');

});

// Policy Changes Banner
async function loadPolicyChanges() {
  const area = document.getElementById('policy-changes-area');
  if (!area) return;
  try {
    const data = await apiFetch('/policy/changes');
    const changes = data.changes || data;
    if (Array.isArray(changes) && changes.length > 0) {
      const names = changes.slice(0,3).map(c => c.airline || c.code).join(', ');
      area.innerHTML = '<div class="policy-changes-banner"><div class="pcb-text"><div class="pcb-title">\uD83D\uDD14 Airline Policy Update</div><div>' + names + ' ' + (changes.length === 1 ? 'has' : 'have') + ' updated their price drop policies.</div></div><button class="btn-pcb" onclick="viewPolicyChanges()">View Changes &rarr;</button></div>';
    }
  } catch(e) { }
}

function viewPolicyChanges() { window.open(API + '/policy/changes', '_blank'); }

// Claim Kit Modal
async function viewClaimKit(bookingId, airline) {
  let overlay = document.getElementById('policy-modal');
  if (!overlay) { overlay = document.createElement('div'); overlay.id = 'policy-modal'; document.body.appendChild(overlay); }
  overlay.className = 'modal-overlay';
  overlay.innerHTML = '<div class="modal-box"><div class="loading-screen" style="min-height:120px;"><div class="spinner"></div></div></div>';
  overlay.style.display = 'flex';
  overlay.onclick = function(e) { if (e.target === overlay) closePolicyModal(); };
  try {
    const { booking } = await apiFetch('/bookings/' + bookingId);
    const b = booking;
    let policy = null;
    try { const pd = await apiFetch('/policy/' + encodeURIComponent(airline)); policy = pd.policy || pd; } catch(e) {}
    const drop = b.lowestPriceSeen ? b.pricePaid - b.lowestPriceSeen : null;
    const isIn24h = b.createdAt && (Date.now() - new Date(b.createdAt)) / 3600000 < 24;
    const expiry = (policy && policy.policies && policy.policies.creditExpiry) || '1 year from original purchase';
    const steps = (policy && policy.policies && policy.policies.claimSteps) || [];
    const claimUrl = (policy && policy.policies && policy.policies.claimUrl) || (AIRLINE_LOOKUP_URLS[airline] || '');
    const claimPhone = (policy && policy.policies && policy.policies.claimPhone) || '';
    const mb = overlay.querySelector('.modal-box');
    let html = '<div class="modal-header"><div class="modal-title">\uD83D\uDCCB Claim Kit &mdash; ' + b.origin + ' &rarr; ' + b.destination + ' &middot; ' + airline + '</div><button class="modal-close" onclick="closePolicyModal()">&times;</button></div>';
    if (isIn24h) html += '<div style="background:linear-gradient(135deg,#d97706,#b45309);color:#fff;border-radius:10px;padding:14px 16px;margin-bottom:16px;"><strong>\u26A1 24-Hour Full Cash Refund Available!</strong><br><span style="font-size:0.88rem;opacity:0.9;">DOT rules entitle you to a FULL CASH REFUND right now. Cancel and rebook at the lower price.</span></div>';
    if (drop && drop > 0) html += '<div style="background:var(--green-light);border:1px solid #bbf7d0;border-radius:10px;padding:14px 16px;margin-bottom:16px;"><div style="font-weight:700;color:var(--green);margin-bottom:4px;">\uD83D\uDCB0 $' + drop.toFixed(2) + ' savings detected</div><div style="font-size:0.88rem;color:#166534;">Paid: $' + b.pricePaid.toFixed(2) + ' &rarr; Current: $' + b.lowestPriceSeen.toFixed(2) + '</div></div>';
    html += '<div style="border-left:4px solid var(--blue);padding:16px;background:var(--blue-light);border-radius:0 10px 10px 0;margin-bottom:16px;"><div style="font-weight:700;color:var(--blue);margin-bottom:10px;">How to Claim &mdash; ' + airline + '</div>';
    if (steps.length > 0) {
      html += '<ol style="margin:0;padding-left:18px;">' + steps.map(function(s){ return '<li style="margin-bottom:8px;font-size:0.9rem;color:#1e40af;">' + s + '</li>'; }).join('') + '</ol>';
    } else {
      html += '<p style="font-size:0.9rem;color:#1e40af;">Contact ' + airline + ' customer service to request a price adjustment for booking ' + (b.confirmationNumber || 'your booking') + '.</p>';
    }
    html += '<div style="margin-top:12px;font-size:0.82rem;color:#1e40af;">\uD83D\uDCC5 Credit valid: <strong>' + expiry + '</strong>' + (claimPhone ? ' &middot; \uD83D\uDCDE ' + claimPhone : '') + '</div></div>';
    if (b.confirmationNumber) html += '<div style="background:var(--slate-light);border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:0.88rem;"><strong>Booking:</strong> ' + airline + ' &middot; ' + b.origin + '&rarr;' + b.destination + ' &middot; Ref: <strong>' + b.confirmationNumber + '</strong>' + (b.flightNumber ? ' &middot; Flight: <strong>' + b.flightNumber + '</strong>' : '') + '</div>';
    html += '<div style="display:flex;gap:10px;flex-wrap:wrap;">';
    if (claimUrl) html += '<a href="' + claimUrl + '" target="_blank" class="btn-primary" style="text-decoration:none;">Claim at ' + airline + ' &rarr;</a>';
    if (drop && drop > 0 && !b.creditClaimed) html += '<button class="btn-secondary" onclick="closePolicyModal(); openClaimCreditModal(\'' + b._id + '\', ' + drop.toFixed(2) + ')">\u2705 Mark as Claimed</button>';
    html += '<button onclick="closePolicyModal()" class="btn-secondary">Close</button></div>';
    html += '<button id="claim-email-btn" class="btn-secondary" style="border-color:#7c3aed;color:#7c3aed;">&#x1F4E7; Generate Claim Email</button>';
    html += '<button onclick="closePolicyModal()" class="btn-secondary">Close</button></div>';
    html += '<div id="email-gen-area"></div>';
    mb.innerHTML = html;
    document.getElementById('claim-email-btn') && document.getElementById('claim-email-btn').addEventListener('click', function() { generateClaimEmail(bookingId); });
  } catch(e) {
    const mb2 = overlay.querySelector('.modal-box');
    if (mb2) mb2.innerHTML = '<div class="modal-header"><div class="modal-title">Claim Kit</div><button class="modal-close" onclick="closePolicyModal()">&times;</button></div><div class="alert alert-error">Could not load claim kit.</div>';
  }
}

function closePolicyModal() { const m = document.getElementById('policy-modal'); if (m) m.style.display = 'none'; }

// Mark Credit Claimed Modal
function openClaimCreditModal(bookingId, suggestedAmount) {
  let overlay = document.getElementById('claim-credit-modal');
  if (!overlay) { overlay = document.createElement('div'); overlay.id = 'claim-credit-modal'; document.body.appendChild(overlay); }
  const expDefault = new Date(Date.now() + 365*86400000).toISOString().split('T')[0];
  overlay.className = 'modal-overlay';
  overlay.style.display = 'flex';
  const box = document.createElement('div');
  box.className = 'modal-box';
  box.style.maxWidth = '420px';
  box.innerHTML = '<div class="modal-header"><div class="modal-title">&#x2705; Record Travel Credit</div><button class="modal-close" onclick="closeCreditModal()">&times;</button></div>' +
    '<p style="color:var(--slate);font-size:0.9rem;margin-bottom:20px;">Record the travel credit so we can track its expiry and remind you before it expires.</p>' +
    '<div class="form-group" style="margin-bottom:14px;"><label>Credit Amount ($)</label><input type="number" id="cc-amount" value="' + suggestedAmount + '" step="0.01" min="0.01"></div>' +
    '<div class="form-group" style="margin-bottom:20px;"><label>Credit Expiry Date</label><input type="date" id="cc-expiry" value="' + expDefault + '"><span class="hint">Usually 1 year from original ticket purchase date</span></div>' +
    '<div style="display:flex;gap:10px;"><button class="btn-primary" style="flex:2;" id="cc-save-btn">Save Credit</button><button class="btn-secondary" style="flex:1;" onclick="closeCreditModal()">Cancel</button></div>';
  overlay.innerHTML = '';
  overlay.appendChild(box);
  document.getElementById('cc-save-btn').onclick = function() { saveClaimedCredit(bookingId); };
  overlay.onclick = function(e) { if (e.target === overlay) overlay.style.display = 'none'; };
}

function closeCreditModal() { const m = document.getElementById('claim-credit-modal'); if (m) m.style.display = 'none'; }


async function saveClaimedCredit(bookingId) {
  const amount = parseFloat(document.getElementById('cc-amount').value);
  const expiryDate = document.getElementById('cc-expiry').value;
  if (!amount || amount <= 0) { alert('Please enter a valid credit amount.'); return; }
  try {
    await apiFetch('/bookings/' + bookingId + '/claim-credit', { method: 'PATCH', body: JSON.stringify({ creditAmount: amount, creditExpiryDate: expiryDate }) });
    document.getElementById('claim-credit-modal').style.display = 'none';
    loadBookings();
  } catch(e) { alert('Failed to save credit. Please try again.'); }
}

// Travel Credits in Account Tab
async function loadTravelCredits() {
  const el = document.getElementById('travel-credits-section');
  if (!el) return;
  try {
    const bs = await apiFetch('/bookings');
    const claimed = bs.filter(function(b){ return b.creditClaimed; });
    const pending = bs.filter(function(b){ return !b.creditClaimed && b.lowestPriceSeen && b.pricePaid > b.lowestPriceSeen; });
    if (claimed.length === 0 && pending.length === 0) { el.style.display = 'none'; return; }
    const totalClaimed = claimed.reduce(function(s,b){ return s + (b.creditAmount||0); }, 0);
    const totalPending = pending.reduce(function(s,b){ return s + (b.pricePaid - b.lowestPriceSeen); }, 0);
    let html = '<div class="card"><div class="card-title">\uD83D\uDCB3 Travel Credits Tracker</div>';
    if (pending.length > 0) html += '<div class="alert alert-info" style="margin-bottom:14px;">\uD83D\uDCB0 <strong>$' + totalPending.toFixed(2) + '</strong> in unclaimed savings across ' + pending.length + ' flight(s). <a href="#" onclick="switchTab(\'flights\'); return false;" style="color:var(--blue);">View &rarr;</a></div>';
    if (claimed.length > 0) {
      html += '<div class="section-title" style="margin-bottom:12px;">Claimed &mdash; Total: <span style="color:var(--green);">$' + totalClaimed.toFixed(2) + '</span></div>';
      claimed.forEach(function(b) {
        const dte = b.creditExpiryDate ? Math.ceil((new Date(b.creditExpiryDate) - Date.now()) / 86400000) : null;
        const ec = dte !== null ? (dte < 7 ? 'expiry-urgent' : dte < 30 ? 'expiry-soon' : 'expiry-ok') : 'expiry-ok';
        html += '<div class="credit-row"><div><div class="cr-airline">' + b.airline + ' &middot; ' + b.origin + '&rarr;' + b.destination + '</div><div class="cr-route">' + new Date(b.departureDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) + (b.creditExpiryDate ? ' &middot; <span class="expiry-pill ' + ec + '">Expires ' + new Date(b.creditExpiryDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) + (dte !== null && dte <= 30 ? ' &mdash; ' + dte + 'd left!' : '') + '</span>' : '') + '</div></div><div class="cr-amount">$' + (b.creditAmount||0).toFixed(2) + '</div></div>';
      });
    }
    html += '</div>';
    el.innerHTML = html;
  } catch(e) { el.style.display = 'none'; }
}


// ── Refund Claim Email Generator ──
async function generateClaimEmail(bookingId) {
  const area = document.getElementById('email-gen-area');
  if (!area) return;
  area.innerHTML = '<div style="padding:16px;text-align:center;"><div class="spinner" style="margin:0 auto;"></div><div style="color:#94a3b8;font-size:0.88rem;margin-top:8px;">Generating your claim email...</div></div>';
  try {
    const data = await apiFetch('/bookings/' + bookingId + '/claim-email');
    area.innerHTML = '<div class="email-gen-box">' +
      '<div style="font-weight:700;color:var(--blue);margin-bottom:12px;">&#x1F4E7; Your Ready-to-Send Claim Email</div>' +
      '<div class="email-gen-subject">Subject Line</div>' +
      '<div class="email-subject-val" id="email-subject-val">' + (data.subject || '') + '</div>' +
      '<div class="email-gen-subject" style="margin-top:8px;">Email Body</div>' +
      '<textarea class="email-body-ta" id="email-body-ta" readonly>' + (data.body || '') + '</textarea>' +
      '<div class="email-gen-actions">' +
      '<button class="btn-primary" style="background:#7c3aed;" onclick="copyClaimEmail()">&#x1F4CB; Copy Email</button>' +
      '<button class="btn-secondary" onclick="downloadClaimEmail()">&#x2B07; Download .txt</button>' +
      (data.claimUrl ? '<a href="' + data.claimUrl + '" target="_blank" class="btn-secondary" style="text-decoration:none;">Open ' + (data.claimPhone ? 'Claim Page' : 'Airline Site') + ' &rarr;</a>' : '') +
      '</div>' +
      (data.claimPhone ? '<div style="font-size:0.8rem;color:#94a3b8;margin-top:8px;">&#x1F4DE; Phone: ' + data.claimPhone + '</div>' : '') +
      '</div>';
  } catch(e) {
    area.innerHTML = '<div class="alert alert-error" style="margin-top:12px;">Could not generate email. Please try again.</div>';
  }
}

function copyClaimEmail() {
  const sub = document.getElementById('email-subject-val');
  const bod = document.getElementById('email-body-ta');
  if (!sub || !bod) return;
  const full = 'Subject: ' + sub.textContent + '\n\n' + bod.value;
  navigator.clipboard.writeText(full).then(function() {
    const btn = event.target;
    const orig = btn.innerHTML;
    btn.innerHTML = '&#x2705; Copied!';
    setTimeout(function() { btn.innerHTML = orig; }, 2000);
  }).catch(function() { alert('Copy this email:\n\nSubject: ' + sub.textContent + '\n\n' + bod.value); });
}

function downloadClaimEmail() {
  const sub = document.getElementById('email-subject-val');
  const bod = document.getElementById('email-body-ta');
  if (!sub || !bod) return;
  const content = 'Subject: ' + sub.textContent + '\n\n' + bod.value;
  const blob = new Blob([content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'tripreclaim-claim-email.txt';
  a.click();
  URL.revokeObjectURL(url);
}

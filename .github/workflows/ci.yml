name: TripReclaim CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: Backend JS Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci --prefer-offline

      - name: Check JS syntax — all backend files
        run: |
          echo 'Checking all backend JS files...'
          FAILED=0
          while IFS= read -r -d '' f; do
            if ! node --check "$f" 2>&1; then
              echo "❌ Syntax error: $f"
              FAILED=1
            fi
          done < <(find backend -name '*.js' ! -path '*/node_modules/*' -print0)
          if [ $FAILED -eq 1 ]; then
            echo '\n❌ Syntax check FAILED — fix errors before merging'
            exit 1
          fi
          echo '✅ All backend JS files pass syntax check'

      - name: Check dashboard JS syntax
        run: |
          echo 'Checking dashboard JS...'
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('landing_page/dashboard/index.html','utf8');
            const scripts = [...html.matchAll(/<script(?![^>]*src)[^>]*>([\\s\\S]*?)<\/script>/g)].map(m=>m[1]);
            const combined = scripts.join('\\n');
            fs.writeFileSync('/tmp/dash_ci.js', combined);
          "
          node --check /tmp/dash_ci.js && echo '✅ Dashboard JS syntax OK' || { echo '❌ Dashboard JS syntax error'; exit 1; }

  api-health:
    name: API Health Check
    runs-on: ubuntu-latest
    needs: syntax-check
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Check live API health
        run: |
          echo 'Checking live API...'
          RESPONSE=$(curl -sf https://tripreclaim-production.up.railway.app/health 2>&1)
          echo "Response: $RESPONSE"
          echo $RESPONSE | grep -q '"status":"ok"' && echo '✅ API health check passed' || echo '⚠️ API health check warning'

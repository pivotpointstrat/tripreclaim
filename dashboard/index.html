<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TripReclaim — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1d4ed8; --blue-dark: #1e40af; --blue-light: #eff6ff;
      --green: #16a34a; --green-light: #f0fdf4;
      --red: #dc2626; --red-light: #fef2f2;
      --slate: #475569; --slate-light: #f8fafc;
      --border: #e2e8f0; --text: #0f172a;
      --card-shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    }
    body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: var(--text); min-height: 100vh; }

    /* ── Navbar ── */
    .navbar { background: var(--blue); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
    .nav-logo { color: #fff; font-weight: 700; font-size: 1.1rem; text-decoration: none; }
    .nav-logo span { color: #93c5fd; }
    .nav-user { color: #bfdbfe; font-size: 0.85rem; display: flex; align-items: center; gap: 12px; }
    .nav-logout { color: #bfdbfe; background: none; border: 1px solid rgba(255,255,255,.2); padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
    .nav-logout:hover { background: rgba(255,255,255,.1); }

    /* ── Page wrapper ── */
    .page { max-width: 900px; margin: 0 auto; padding: 28px 20px 60px; }

    /* ── Welcome bar ── */
    .welcome-bar { margin-bottom: 24px; }
    .welcome-bar h1 { font-size: 1.4rem; font-weight: 700; color: var(--text); }
    .welcome-bar p { color: var(--slate); font-size: 0.9rem; margin-top: 2px; }

    /* ── Tabs ── */
    .tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 28px; gap: 0; }
    .tab { padding: 10px 20px; font-size: 0.95rem; font-weight: 500; color: var(--slate); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none; }
    .tab:hover { color: var(--blue); }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

    /* ── Cards ── */
    .card { background: #fff; border-radius: 12px; box-shadow: var(--card-shadow); padding: 24px; margin-bottom: 20px; }
    .card-title { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .card-title .badge { font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 20px; background: var(--blue-light); color: var(--blue); }

    /* ── Forms ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 0.85rem; font-weight: 600; color: #374151; }
    input, select, textarea { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; width: 100%; outline: none; transition: border-color 0.15s; font-family: inherit; }
    input:focus, select:focus, textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(29,78,216,0.1); }
    .hint { font-size: 0.78rem; color: #94a3b8; margin-top: 2px; }
    .form-actions { margin-top: 20px; display: flex; gap: 12px; align-items: center; }

    /* ── Buttons ── */
    .btn-primary { background: var(--blue); color: #fff; padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn-primary:hover { background: var(--blue-dark); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: #fff; color: var(--blue); padding: 10px 20px; border: 1px solid var(--blue); border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
    .btn-secondary:hover { background: var(--blue-light); }
    .btn-sm { padding: 5px 12px; font-size: 0.8rem; font-weight: 500; border-radius: 6px; border: 1px solid var(--border); background: #fff; cursor: pointer; color: var(--slate); }
    .btn-sm:hover { border-color: var(--blue); color: var(--blue); }
    .btn-sm.danger:hover { border-color: var(--red); color: var(--red); }
    .btn-danger { background: var(--red); color: #fff; padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }

    /* ── Alerts ── */
    .alert { padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; margin-top: 12px; }
    .alert-success { background: var(--green-light); color: #15803d; }
    .alert-error { background: var(--red-light); color: #b91c1c; }
    .alert-info { background: var(--blue-light); color: var(--blue); }

    /* ── Savings banner ── */
    .savings-banner { background: linear-gradient(135deg, #16a34a, #15803d); color: #fff; padding: 16px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
    .savings-banner .amount { font-size: 1.6rem; font-weight: 800; }
    .savings-banner .label { font-size: 0.85rem; opacity: 0.9; }

    /* ── Plan card ── */
    .plan-card { background: var(--blue); color: #fff; border-radius: 12px; padding: 20px 24px; margin-bottom: 20px; }
    .plan-card .plan-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .plan-card .plan-detail { font-size: 0.85rem; opacity: 0.85; margin-bottom: 16px; }
    .plan-card .plan-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .plan-badge { background: rgba(255,255,255,0.15); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 500; }
    .plan-badge.warn { background: rgba(251,191,36,0.25); color: #fde68a; }
    .plan-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-plan { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn-plan:hover { background: rgba(255,255,255,0.25); }
    .btn-plan.upgrade { background: #fff; color: var(--blue); border-color: #fff; }
    .btn-plan.upgrade:hover { background: #e0e7ff; }

    /* ── Booking cards ── */
    .booking-card { background: #fff; border-radius: 12px; box-shadow: var(--card-shadow); padding: 16px 20px; margin-bottom: 14px; border-left: 4px solid var(--blue); }
    .booking-card.paused { border-left-color: #94a3b8; opacity: 0.85; }
    .booking-card.expired { border-left-color: #e2e8f0; opacity: 0.6; }
    .booking-route { font-size: 1.05rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .booking-meta { font-size: 0.82rem; color: var(--slate); margin: 4px 0 10px; }
    .booking-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 12px 0; }
    .stat-box { background: var(--slate-light); border-radius: 8px; padding: 10px 12px; }
    .stat-label { font-size: 0.73rem; color: #94a3b8; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
    .stat-value { font-size: 1rem; font-weight: 700; color: var(--text); margin-top: 2px; }
    .stat-value.drop { color: var(--green); }
    .booking-footer { font-size: 0.76rem; color: #94a3b8; margin-top: 8px; }
    .booking-actions { margin-top: 12px; display: flex; gap: 8px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; }
    .status-dot.paused { background: #94a3b8; }
    .status-dot.expired { background: #e2e8f0; }

    /* ── Onboarding wizard overlay ── */
    .onboarding-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .onboarding-box { background: #fff; border-radius: 16px; padding: 36px 32px; max-width: 480px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .onboarding-logo { font-size: 1.3rem; font-weight: 800; color: var(--blue); margin-bottom: 20px; }
    .onboarding-step { display: none; }
    .onboarding-step.active { display: block; }
    .onboarding-box h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 8px; }
    .onboarding-box p { color: var(--slate); font-size: 0.95rem; margin-bottom: 24px; line-height: 1.6; }
    .onboarding-progress { display: flex; gap: 6px; margin-bottom: 28px; }
    .prog-dot { height: 4px; border-radius: 2px; flex: 1; background: var(--border); transition: background 0.2s; }
    .prog-dot.done { background: var(--blue); }
    .toggle-group { display: flex; gap: 10px; margin: 8px 0 16px; }
    .toggle-opt { flex: 1; padding: 10px; border: 2px solid var(--border); border-radius: 8px; text-align: center; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.15s; }
    .toggle-opt.selected { border-color: var(--blue); background: var(--blue-light); color: var(--blue); }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 48px 24px; color: var(--slate); }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-state h3 { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-bottom: 8px; }

    /* ── Profile form ── */
    .profile-section { margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
    .profile-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .section-title { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #94a3b8; margin-bottom: 14px; }

    /* ── Loading ── */
    .loading-screen { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Auth screen ── */
    .auth-screen { max-width: 400px; margin: 60px auto; background: #fff; border-radius: 16px; box-shadow: var(--card-shadow); padding: 36px 32px; text-align: center; }
    .auth-screen .logo { font-size: 1.5rem; font-weight: 800; color: var(--blue); margin-bottom: 20px; }
    .auth-screen h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
    .auth-screen p { color: var(--slate); font-size: 0.9rem; margin-bottom: 24px; }
    #auth-msg { min-height: 20px; }

    /* ── Price History Modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.7); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-box { background: #fff; border-radius: 16px; padding: 28px; max-width: 640px; width: 100%; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .modal-title { font-size: 1.1rem; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #94a3b8; line-height: 1; }
    .modal-close:hover { color: var(--text); }
    .chart-wrap { background: var(--slate-light); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    .chart-label { font-size: 0.78rem; color: #94a3b8; font-weight: 500; margin-bottom: 8px; }
    .history-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .history-table th { text-align: left; padding: 8px 10px; background: var(--slate-light); color: #94a3b8; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; }
    .history-table td { padding: 8px 10px; border-top: 1px solid var(--border); }
    .history-table tr:hover td { background: var(--blue-light); }
    .price-drop { color: var(--green); font-weight: 600; }
    /* ── Referral card ── */
    .referral-card { background: linear-gradient(135deg, #1d4ed8, #7c3aed); border-radius: 12px; padding: 24px; color: #fff; margin-bottom: 20px; }
    .referral-card h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 6px; }
    .referral-card p { font-size: 0.88rem; opacity: 0.85; margin-bottom: 16px; line-height: 1.5; }
    .referral-link-box { background: rgba(255,255,255,0.15); border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; font-family: monospace; margin-bottom: 12px; word-break: break-all; }
    .btn-copy { background: #fff; color: var(--blue); border: none; padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
    .btn-copy:hover { background: #e0e7ff; }
    .referral-stats { display: flex; gap: 16px; margin-top: 12px; }
    .ref-stat { text-align: center; }
    .ref-stat .val { font-size: 1.4rem; font-weight: 800; }
    .ref-stat .lbl { font-size: 0.78rem; opacity: 0.8; }
  </style>
</head>
<body>
<div id="root"></div>

<script>
const API = 'https://tripreclaim-production.up.railway.app';

// ── Airline list ──
const AIRLINES = [
  'American Airlines','Delta Air Lines','United Airlines','Southwest Airlines','JetBlue','Alaska Airlines',
  'Spirit Airlines','Frontier Airlines','Hawaiian Airlines','Sun Country Airlines','Allegiant Air',
  'Air France','KLM','Lufthansa','British Airways','Virgin Atlantic','Swiss International Air Lines',
  'Austrian Airlines','Brussels Airlines','Finnair','Iberia','SAS Scandinavian Airlines','Turkish Airlines',
  'Aer Lingus','EasyJet','Ryanair','Wizz Air','TAP Air Portugal','LOT Polish Airlines',
  'Qatar Airways','Emirates','Etihad Airways','Air Arabia','flydubai','Saudia',
  'Singapore Airlines','Cathay Pacific','Japan Airlines','ANA All Nippon Airways','Korean Air',
  'Asiana Airlines','Air China','China Eastern','China Southern','EVA Air',
  'Thai Airways','Malaysia Airlines','Qantas','Air New Zealand','Garuda Indonesia',
  'Air Canada','WestJet','Aeromexico','LATAM Airlines','Avianca','Copa Airlines',
  'GOL Airlines','Azul Brazilian Airlines',
];

// ── Auth helpers ──
const getToken = () => localStorage.getItem('tr_token');
const setToken = t => localStorage.setItem('tr_token', t);
const clearToken = () => { localStorage.removeItem('tr_token'); localStorage.removeItem('tr_user'); };
const getUser = () => { try { return JSON.parse(localStorage.getItem('tr_user')); } catch { return null; } };
const setUser = u => localStorage.setItem('tr_user', JSON.stringify(u));

const authHeaders = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` });

async function apiFetch(path, opts = {}) {
  const r = await fetch(`${API}${path}`, { headers: authHeaders(), ...opts });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function render(html) { document.getElementById('root').innerHTML = html; }

// ── Active tab ──
let activeTab = 'flights';

// ── Router ──
async function init() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (token) {
    render(loadingScreen());
    try {
      const data = await fetch(`${API}/auth/verify?token=${encodeURIComponent(token)}`).then(r => r.json());
      if (data.error) { renderAuth(data.error); return; }
      setToken(data.token);
      setUser(data.user);
      window.history.replaceState({}, '', '/dashboard/');
      await renderApp();
    } catch (e) {
      renderAuth('Link expired or invalid. Request a new one below.');
    }
    return;
  }

  if (getToken()) {
    try {
      const data = await apiFetch('/auth/me');
      setUser(data);
      await renderApp();
    } catch {
      clearToken();
      renderAuth();
    }
  } else {
    renderAuth();
  }
}

// ── Auth screen ──
function renderAuth(msg = '') {
  render(`
    <div class="auth-screen">
      <div class="logo">✈️ <span>Trip</span>Reclaim</div>
      <h2>Sign in to your dashboard</h2>
      <p>Enter your email and we'll send you a secure login link.</p>
      <div class="form-group" style="text-align:left">
        <label>Email Address</label>
        <input type="email" id="auth-email" placeholder="you@example.com">
      </div>
      <div id="auth-msg">${msg ? `<div class="alert alert-error">${msg}</div>` : ''}</div>
      <button class="btn-primary" id="auth-btn" onclick="sendMagicLink()" style="width:100%;margin-top:16px;">Send Login Link →</button>
      <p style="margin-top:20px;font-size:0.82rem;color:#94a3b8;">Don't have an account? <a href="/" style="color:var(--blue);">Get started on the homepage</a></p>
    </div>
  `);
  document.getElementById('auth-email').focus();
  document.getElementById('auth-email').addEventListener('keydown', e => { if (e.key === 'Enter') sendMagicLink(); });
}

async function sendMagicLink() {
  const email = document.getElementById('auth-email')?.value?.trim();
  if (!email) return;
  const btn = document.getElementById('auth-btn');
  btn.disabled = true; btn.textContent = 'Sending...';
  try {
    const r = await fetch(`${API}/auth/magic-link`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const d = await r.json();
    document.getElementById('auth-msg').innerHTML = `<div class="alert alert-success">✅ Check your email for a login link!</div>`;
  } catch (e) {
    document.getElementById('auth-msg').innerHTML = `<div class="alert alert-error">Failed to send. Try again.</div>`;
  }
  btn.disabled = false; btn.textContent = 'Send Login Link →';
}

// ── Main app ──
async function renderApp() {
  const user = getUser() || {};
  renderShell(user);
  if (!user.onboardingComplete && !user.name) {
    showOnboarding();
  } else {
    switchTab(activeTab);
  }
}

function renderShell(user) {
  const firstName = user.name ? user.name.split(' ')[0] : (user.email ? user.email.split('@')[0] : 'there');
  render(`
    <nav class="navbar">
      <a href="/" class="nav-logo">✈️ <span>Trip</span>Reclaim</a>
      <div class="nav-user">
        <span>${user.email || ''}</span>
        <button class="nav-logout" onclick="logout()">Sign out</button>
      </div>
    </nav>
    <div class="page">
      <div class="welcome-bar">
        <h1>Welcome back${user.name ? ', ' + user.name.split(' ')[0] : ''}! ✈️</h1>
        <p>Monitor your flight prices and claim refunds when they drop.</p>
      </div>
      <div class="tabs">
        <button class="tab ${activeTab==='flights'?'active':''}" onclick="switchTab('flights')">✈ My Flights</button>
        <button class="tab ${activeTab==='account'?'active':''}" onclick="switchTab('account')">👤 Account</button>
      </div>
      <div id="tab-content"></div>
    </div>
    <div id="onboarding-overlay" style="display:none;"></div>
  `);
}

function switchTab(tab) {
  activeTab = tab;
  // Update tab buttons
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab')[tab === 'flights' ? 0 : 1]?.classList.add('active');
  if (tab === 'flights') renderFlightsTab();
  else renderAccountTab();
}

function logout() {
  clearToken();
  renderAuth();
}

// ── Loading ──
function loadingScreen() {
  return `<div class="loading-screen"><div class="spinner"></div></div>`;
}

// ══════════════════════════════════════
// ONBOARDING WIZARD
// ══════════════════════════════════════
let obStep = 1;
let obData = { name: '', phone: '', notifEmail: true, notifSms: false };

function showOnboarding() {
  obStep = 1;
  const overlay = document.getElementById('onboarding-overlay');
  overlay.style.display = 'flex';
  renderOnboardingStep();
}

function renderOnboardingStep() {
  const overlay = document.getElementById('onboarding-overlay');
  overlay.className = 'onboarding-overlay';
  overlay.innerHTML = `
    <div class="onboarding-box">
      <div class="onboarding-logo">✈️ TripReclaim</div>
      <div class="onboarding-progress">
        <div class="prog-dot ${obStep >= 1 ? 'done' : ''}"></div>
        <div class="prog-dot ${obStep >= 2 ? 'done' : ''}"></div>
        <div class="prog-dot ${obStep >= 3 ? 'done' : ''}"></div>
      </div>
      ${obStep === 1 ? renderObStep1() : ''}
      ${obStep === 2 ? renderObStep2() : ''}
      ${obStep === 3 ? renderObStep3() : ''}
    </div>
  `;
}

function renderObStep1() {
  return `
    <div class="onboarding-step active">
      <h2>Welcome to TripReclaim! 🎉</h2>
      <p>Let's set up your account so we can personalize your price alerts and keep you informed when your fares drop.</p>
      <div class="form-group" style="margin-bottom:20px;">
        <label>Your Full Name *</label>
        <input type="text" id="ob-name" placeholder="e.g. Jane Smith" value="${obData.name}">
      </div>
      <button class="btn-primary" style="width:100%;" onclick="obNext1()">Continue →</button>
    </div>
  `;
}

function renderObStep2() {
  return `
    <div class="onboarding-step active">
      <h2>Notification Preferences</h2>
      <p>How would you like to be notified when we detect a price drop on your flights?</p>
      <div class="form-group" style="margin-bottom:16px;">
        <label>Phone Number <span style="font-weight:400;color:#94a3b8">(optional — for SMS alerts)</span></label>
        <input type="tel" id="ob-phone" placeholder="+1 (555) 000-0000" value="${obData.phone}">
      </div>
      <label style="font-size:0.85rem;font-weight:600;color:#374151;margin-bottom:8px;display:block;">Alert Methods</label>
      <div class="toggle-group">
        <div class="toggle-opt ${obData.notifEmail ? 'selected' : ''}" onclick="toggleOb('email')" id="tog-email">📧 Email</div>
        <div class="toggle-opt ${obData.notifSms ? 'selected' : ''}" onclick="toggleOb('sms')" id="tog-sms">📱 SMS</div>
      </div>
      <p class="hint" style="margin-top:4px;">Email alerts are always on. SMS requires a phone number above.</p>
      <div style="display:flex;gap:12px;margin-top:20px;">
        <button class="btn-secondary" style="flex:1;" onclick="obBack()">← Back</button>
        <button class="btn-primary" style="flex:2;" onclick="obNext2()">Continue →</button>
      </div>

function renderSavings() {
  const total = bookings.reduce((s, b) => {
    if (b.lowestPriceSeen && b.pricePaid > b.lowestPriceSeen) return s + (b.pricePaid - b.lowestPriceSeen);
    return s;

  const el = document.getElementById('savings-area');

    el.innerHTML = `<div class="savings-banner"><div><div class="label">💰 Total savings found</div><div class="amount">$${total.toFixed(2)}</div></div><div style="font-size:0.85rem;opacity:0.85;text-align:right;">across ${bookings.filter(b=>b.lowestPriceSeen&&b.pricePaid>b.lowestPriceSeen).length} flight(s)</div></div>`;

// ── Price formatter ──
function formatPrice(input) {
  let raw = input.value.replace(/[^0-9.]/g, '');
  const parts = raw.split('.');
  if (raw) {
    const intPart = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    const decPart = parts[1] !== undefined ? '.' + parts[1].slice(0, 2) : '';
    input.value = '$' + intPart + decPart;
  }
}

async function submitBooking(e) {
  e.preventDefault();
  const form = e.target;
  const btn = document.getElementById('submit-btn');
  const msgEl = document.getElementById('form-msg');
  btn.disabled = true; btn.textContent = 'Submitting...';
  msgEl.innerHTML = '';

  const body = {
    airline: form.airline.value,
    origin: form.origin.value.toUpperCase(),
    destination: form.destination.value.toUpperCase(),
    departureDate: form.departureDate.value,
    returnDate: form.returnDate.value || null,
    cabinClass: form.cabinClass.value,
    passengers: parseInt(form.passengers.value),
    pricePaid: parseFloat(form.pricePaid.value.replace(/[$,]/g, '')),
    dropThreshold: parseFloat(form.dropThreshold.value) || 10,
    confirmationNumber: form.confirmationNumber.value || null,
  };

  try {
    await apiFetch('/bookings', { method: 'POST', body: JSON.stringify(body) });
    msgEl.innerHTML = `<div class="alert alert-success">✅ Flight added! We're now monitoring ${body.origin} → ${body.destination}.</div>`;
    form.reset();
    loadBookings();
  } catch (err) {
    msgEl.innerHTML = `<div class="alert alert-error">❌ ${err.message}</div>`;
  }
  btn.disabled = false; btn.textContent = 'Start Monitoring This Flight →';
}

}

function renderPriceChart(priceHistory, pricePaid) {
  if (!priceHistory || priceHistory.length < 2) {
    return '<div style="text-align:center;padding:24px;color:#94a3b8;">Not enough data yet — check back after a few monitoring cycles.</div>';
  }

  const prices = priceHistory.map(p => p.price);
  const dates = priceHistory.map(p => p.checkedAt);
  const min = Math.min(...prices, pricePaid * 0.7);
  const max = Math.max(...prices, pricePaid * 1.1);
  const range = max - min || 1;

  const W = 540, H = 140, PAD = 24;
  const pts = prices.map((p, i) => {
    const x = PAD + ((i / (prices.length - 1)) * (W - PAD * 2));
    const y = PAD + ((1 - (p - min) / range) * (H - PAD * 2));
    return [x, y, p];
  });

  const line = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const area = line + ` L${pts[pts.length-1][0].toFixed(1)},${H} L${PAD},${H} Z`;

  // Paid price line
  const paidY = PAD + ((1 - (pricePaid - min) / range) * (H - PAD * 2));

  const dots = pts.map(([x, y, price]) =>
    `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="${price < pricePaid ? '#16a34a' : '#1d4ed8'}" />`
  ).join('');

  return `
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.2"/>
          <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <!-- Area fill -->
      <path d="${area}" fill="url(#grad)"/>
      <!-- Paid price reference line -->
      <line x1="${PAD}" y1="${paidY.toFixed(1)}" x2="${W - PAD}" y2="${paidY.toFixed(1)}" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
      <text x="${W - PAD - 2}" y="${(paidY - 4).toFixed(1)}" font-size="9" fill="#dc2626" text-anchor="end">paid $${pricePaid.toFixed(0)}</text>
      <!-- Price line -->
      <path d="${line}" fill="none" stroke="#1d4ed8" stroke-width="2" stroke-linejoin="round"/>
      <!-- Dots -->
      ${dots}
      <!-- Y-axis labels -->
      <text x="4" y="${PAD + 4}" font-size="9" fill="#94a3b8">$${max.toFixed(0)}</text>
      <text x="4" y="${H - PAD + 4}" font-size="9" fill="#94a3b8">$${min.toFixed(0)}</text>
    </svg>
  `;
}

async function viewBookingHistory(id) {
  // Create modal
  let overlay = document.getElementById('history-modal');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'history-modal';
    document.body.appendChild(overlay);
  }
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal-box"><div class="loading-screen" style="min-height:120px;"><div class="spinner"></div></div></div>`;
  overlay.style.display = 'flex';
  overlay.addEventListener('click', e => { if (e.target === overlay) closeHistoryModal(); });

  try {
    const { booking } = await apiFetch(`/bookings/${id}`);
    const ph = booking.priceHistory || [];
    const dep = new Date(booking.departureDate).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'});
    const lowest = ph.length ? Math.min(...ph.map(p => p.price)) : null;
    const savings = lowest && lowest < booking.pricePaid ? booking.pricePaid - lowest : null;

    overlay.querySelector('.modal-box').innerHTML = `
      <div class="modal-header">
        <div class="modal-title">📈 ${booking.origin} → ${booking.destination} · ${dep}</div>
        <button class="modal-close" onclick="closeHistoryModal()">×</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;">
        <div class="stat-box"><div class="stat-label">Price Paid</div><div class="stat-value">$${booking.pricePaid.toFixed(2)}</div></div>
        <div class="stat-box"><div class="stat-label">Lowest Seen</div><div class="stat-value">${lowest ? '$'+lowest.toFixed(2) : '—'}</div></div>
        <div class="stat-box"><div class="stat-label">Potential Savings</div><div class="stat-value ${savings ? 'drop' : ''}">${savings ? '$'+savings.toFixed(2) : '—'}</div></div>
      </div>
      <div class="chart-wrap">
        <div class="chart-label">PRICE HISTORY · ${ph.length} data points · <span style="color:#dc2626;">— your paid price</span></div>
        ${renderPriceChart(ph, booking.pricePaid)}
      </div>
      ${ph.length > 0 ? `
        <table class="history-table">
          <thead><tr><th>Date & Time</th><th>Price Found</th><th>vs Paid</th></tr></thead>
          <tbody>
            ${ph.slice().reverse().slice(0, 20).map(p => {
              const diff = booking.pricePaid - p.price;
              const dt = new Date(p.checkedAt).toLocaleString('en-US', {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
              return `<tr><td>${dt}</td><td>$${p.price.toFixed(2)}</td><td class="${diff > 0 ? 'price-drop' : ''}">$${diff > 0 ? '-'+diff.toFixed(2)+' savings' : '+'+Math.abs(diff).toFixed(2)+' higher'}</td></tr>`;
            }).join('')}
          </tbody>
        </table>
      ` : '<p style="text-align:center;color:#94a3b8;padding:16px;">No price checks yet — the cron job will check within 30 minutes.</p>'}
    `;
  } catch(e) {
    overlay.querySelector('.modal-box').innerHTML = `
      <div class="modal-header">
        <div class="modal-title">Price History</div>
        <button class="modal-close" onclick="closeHistoryModal()">×</button>
      </div>
      <div class="alert alert-error">Failed to load price history.</div>
    `;
  }
}

function closeHistoryModal() {
  const m = document.getElementById('history-modal');
  if (m) m.style.display = 'none';
}

// SPRINT 2 — REFERRAL SYSTEM
// ══════════════════════════════════════

async function loadReferral() {
  const el = document.getElementById('referral-section');
  if (!el) return;
  el.innerHTML = '<div style="padding:16px;color:#94a3b8;">Loading referral info...</div>';
  try {
    const data = await apiFetch('/auth/referral');
    el.innerHTML = `
      <div class="referral-card">
        <h3>🎁 Refer a Friend — Earn Free Trips</h3>
        <p>Share your unique link. When a friend subscribes, you both get 1 free Per Trip credit added to your account.</p>
        <div class="referral-stats">
          <div class="ref-stat"><div class="val">${data.referralCount}</div><div class="lbl">Referrals</div></div>
          <div class="ref-stat"><div class="val">${data.tripsEarned}</div><div class="lbl">Free trips earned</div></div>
        </div>
        <div class="referral-link-box" id="ref-link-box">${data.referralLink}</div>
        <button class="btn-copy" onclick="copyReferralLink('${data.referralLink}')">Copy Link</button>
      </div>
    `;
  } catch(e) {
    el.innerHTML = '<div class="alert alert-error">Could not load referral info.</div>';
  }
}

function copyReferralLink(link) {
  navigator.clipboard.writeText(link).then(() => {
    const btn = event.target;
    btn.textContent = 'Copied! ✅';
    setTimeout(() => btn.textContent = 'Copy Link', 2000);
  }).catch(() => {
    document.getElementById('ref-link-box').select?.();
    alert('Copy this link: ' + link);
  });
}

// ── Boot ──
init();
